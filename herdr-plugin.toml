id = "shunichi.hint"
name = "Hint"
version = "0.2.0"
min_herdr_version = "0.7.5"
description = "Jump to any herdr agent (incremental filter or Vimium-style hints)"
platforms = ["linux", "macos"]

[[build]]
command = ["go", "build", "-o", "herdr-hint", "."]

[[panes]]
id = "jump"
title = "Hint Jump"
placement = "popup"
width = "60%"
height = "50%"
command = ["sh", "-c", "${HERDR_PLUGIN_ROOT}/herdr-hint"]

[[panes]]
id = "filter"
title = "Filter Jump"
placement = "popup"
width = "60%"
height = "50%"
command = ["sh", "-c", "${HERDR_PLUGIN_ROOT}/herdr-hint filter"]
